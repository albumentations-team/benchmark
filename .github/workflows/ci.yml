name: CI
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  check_code_formatting_types:
    name: Check code formatting with ruff and mypy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13"]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install uv and set Python version ${{ matrix.python-version }}
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Install dependencies
      run: |
        uv python install ${{ matrix.python-version }}
        uv venv --python ${{ matrix.python-version }}
        uv pip install --python .venv -r requirements-dev.txt

    - name: Check code formatting with pre-commit
      run: uv run pre-commit run --all-files

    - name: Run tests with coverage
      run: |
        uv pip install --python .venv numpy
        uv run pytest -n auto --cov=benchmark --cov=tools --cov-report=xml
